<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Poker Night 🃏</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- LOBBY -->
<div id="lobby">
  <div class="lobby-bg"></div>
  <div class="lobby-content">
    <h1 class="logo">♠ Poker Night</h1>
    <p class="logo-sub">tg:paracetomolhaze</p>
    <div class="lobby-tabs">
      <button class="ltab active" id="tab-create-btn" onclick="switchTab('create')">Создать стол</button>
      <button class="ltab" id="tab-join-btn" onclick="switchTab('join')">Войти в комнату</button>
    </div>
    <div id="tab-create" class="tab-pane active">
      <div class="form-group"><label>Ваше имя</label>
        <input type="text" id="create-name" placeholder="Как вас зовут?" maxlength="20"></div>
      <div class="settings-grid">
        <div class="form-group"><label>Бай-ин</label>
          <input type="number" id="s-buyin" value="1000" min="100" step="100"></div>
        <div class="form-group"><label>Малый блайнд</label>
          <input type="number" id="s-sb" value="10" min="1"></div>
        <div class="form-group"><label>Большой блайнд</label>
          <input type="number" id="s-bb" value="20" min="2"></div>
        <div class="form-group"><label>Анте</label>
          <input type="number" id="s-ante" value="0" min="0"></div>
      </div>
      <button class="btn-primary" onclick="createRoom()">Создать стол</button>
    </div>
    <div id="tab-join" class="tab-pane">
      <div class="form-group"><label>Ваше имя</label>
        <input type="text" id="join-name" placeholder="Как вас зовут?" maxlength="20"></div>
      <div class="form-group"><label>Код комнаты</label>
        <input type="text" id="join-code" placeholder="XXXXXX" maxlength="6"
          style="text-transform:uppercase;letter-spacing:.3em;font-size:1.4em;"></div>
      <button class="btn-primary" onclick="joinRoom()">Войти</button>
    </div>
    <div id="lobby-error" class="error-msg"></div>
  </div>
</div>

<!-- GAME -->
<div id="game">

  <!-- TOP BAR -->
  <div id="game-header">
    <div class="hdr-l">
      <span class="logo-small">♠ Poker Night</span>
      <span id="hdr-room"></span>
    </div>
    <div class="hdr-c">
      <span id="hdr-phase"></span>
      <span id="hdr-hand"></span>
      <span id="hdr-pot">БАНК <b id="pot-amount">0</b></span>
    </div>
    <div class="hdr-r">
      <button class="hbtn" id="cam-btn" onclick="toggleCamera()">📷 Камера</button>
      <button class="hbtn" onclick="toggleHistory()">📋 История</button>
      <button class="hbtn hbtn-exit" onclick="leaveTable()">✕</button>
    </div>
  </div>

  <!-- MAIN: table + seats fill everything -->
  <div id="game-main">

    <!-- The oval table -->
    <div id="table-wrap">
      <div id="poker-table">
        <div id="table-center">
          <div id="community-cards"></div>
        </div>
      </div>
    </div>

    <!-- Player tiles — absolutely positioned, JS sets positions -->
    <div id="players-layer"></div>

    <!-- Chip animations -->
    <div id="chip-anim-layer"></div>

  </div>

  <!-- BOTTOM ACTION BAR -->
  <div id="action-bar">
    <!-- My cards shown here -->
    <div id="my-hole-cards"></div>
    <div id="my-combo-label"></div>

    <!-- Buttons -->
    <div id="action-btns">
      <button class="act-btn fold-btn"  id="btn-fold"  onclick="sendAction('fold')">ФОЛД</button>
      <button class="act-btn check-btn" id="btn-check" onclick="sendAction('check')">ЧЕК</button>
      <button class="act-btn call-btn"  id="btn-call"  onclick="sendAction('call')">КОЛЛ</button>
      <div id="raise-group">
        <div id="raise-left">
          <input type="range" id="raise-slider" min="0" max="10000" value="0" oninput="onSlider()">
          <div id="raise-presets">
            <button onclick="setRaisePct(0.33)">⅓</button>
            <button onclick="setRaisePct(0.5)">½</button>
            <button onclick="setRaisePct(0.75)">¾</button>
            <button onclick="setRaisePct(1)">POT</button>
            <button onclick="setRaisePct(2)">2x</button>
          </div>
        </div>
        <div id="raise-val">0</div>
        <button class="act-btn raise-btn" id="btn-raise" onclick="sendAction('raise')">РЕЙЗ</button>
      </div>
      <button class="act-btn allin-btn" id="btn-allin" onclick="sendAction('allin')">ALL IN</button>
    </div>

    <!-- My chips -->
    <div id="my-stack">
      <div class="chip-pip"></div>
      <span id="my-chips">0</span>
    </div>
  </div>

</div>

<!-- WAITING -->
<div id="waiting-overlay">
  <div class="overlay-box">
    <h2>Ожидание игроков</h2>
    <div class="room-code-big" id="ov-room-code">—</div>
    <p class="hint">Поделитесь кодом с друзьями</p>
    <div id="ov-players"></div>
    <button id="ov-start-btn" onclick="startGame()" style="display:none">▶ Начать игру</button>
    <p id="ov-waiting-msg" class="dimtext">Только хост может начать игру</p>
  </div>
</div>

<!-- WINNER BANNER -->
<div id="winner-banner" style="display:none">
  <div id="winner-inner"><span id="winner-text"></span></div>
</div>

<!-- HISTORY PANEL -->
<div id="history-panel" style="display:none">
  <div id="history-hdr">
    <span>📋 История раздач</span>
    <button onclick="toggleHistory()">✕</button>
  </div>
  <div id="history-list"></div>
</div>

<div id="toast"></div>

<script src="/socket.io/socket.io.js"></script>
<script src="sounds.js"></script>
<script src="client.js"></script>
</body>
</html>
