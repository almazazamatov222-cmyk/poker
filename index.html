<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Poker Night</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- LOBBY -->
<div id="lobby">
  <div class="lobby-bg"></div>
  <div class="lobby-card">
    <h1 class="logo">♠ Poker Night</h1>
    <p class="logo-sub">tg:paracetomolhaze</p>
    <div class="ltabs">
      <button class="ltab active" id="tab-create-btn" onclick="switchTab('create')">Создать стол</button>
      <button class="ltab" id="tab-join-btn" onclick="switchTab('join')">Войти</button>
    </div>
    <div id="tab-create" class="tab-pane active">
      <div class="fg"><label>Ваше имя</label><input id="create-name" placeholder="Как вас зовут?" maxlength="20"></div>
      <div class="fgrid">
        <div class="fg"><label>Бай-ин</label><input type="number" id="s-buyin" value="1000" min="100" step="100"></div>
        <div class="fg"><label>Малый блайнд</label><input type="number" id="s-sb" value="10" min="1"></div>
        <div class="fg"><label>Большой блайнд</label><input type="number" id="s-bb" value="20" min="2"></div>
        <div class="fg"><label>Анте</label><input type="number" id="s-ante" value="0" min="0"></div>
      </div>
      <button class="btn-primary" onclick="createRoom()">Создать стол</button>
    </div>
    <div id="tab-join" class="tab-pane">
      <div class="fg"><label>Ваше имя</label><input id="join-name" placeholder="Как вас зовут?" maxlength="20"></div>
      <div class="fg"><label>Код комнаты</label><input id="join-code" placeholder="XXXXXX" maxlength="6" style="text-transform:uppercase;letter-spacing:.3em;font-size:1.3em;"></div>
      <button class="btn-primary" onclick="joinRoom()">Войти</button>
    </div>
    <div id="lobby-error" class="lerr"></div>
  </div>
</div>

<!-- GAME -->
<div id="game">

  <!-- TOP BAR -->
  <div id="topbar">
    <div class="tb-l"><span class="logo-sm">♠</span><span id="hdr-room"></span></div>
    <div class="tb-c">
      <span id="hdr-phase"></span>
      <div id="pot-badge">БАНК <b id="pot-amount">0</b></div>
      <span id="hdr-hand"></span>
    </div>
    <div class="tb-r">
      <button class="tbtn" id="cam-btn" onclick="toggleCamera()">📷 Камера</button>
      <button class="tbtn" onclick="toggleHistory()">📋</button>
      <button class="tbtn tbtn-x" onclick="leaveTable()">✕</button>
    </div>
  </div>

  <!-- TABLE AREA -->
  <div id="arena">
    <div id="table-wrap">
      <div id="poker-table">
        <!-- Community cards in center -->
        <div id="board-area">
          <div id="community-cards"></div>
          <div id="my-hole-area">
            <div id="my-cards"></div>
            <div id="my-combo"></div>
          </div>
        </div>
      </div>
    </div>
    <!-- Players rendered here -->
    <div id="seats"></div>
    <!-- Chip animations -->
    <div id="chip-layer"></div>
  </div>

  <!-- ACTION BAR -->
  <div id="actionbar">
    <div id="act-buttons">
      <button class="abtn abtn-fold"  id="btn-fold"  onclick="sendAction('fold')">ФОЛД</button>
      <button class="abtn abtn-check" id="btn-check" onclick="sendAction('check')">ЧЕК</button>
      <button class="abtn abtn-call"  id="btn-call"  onclick="sendAction('call')">КОЛЛ</button>
      <button class="abtn abtn-raise" id="btn-raise-open" onclick="toggleRaisePanel()">РЕЙЗ ▲</button>
      <button class="abtn abtn-allin" id="btn-allin" onclick="sendAction('allin')">ALL IN</button>
    </div>
    <div id="my-stack-badge">
      <span class="sdot"></span>
      <span id="my-chips">0</span>
    </div>
  </div>

  <!-- RAISE PANEL — slides up above action bar -->
  <div id="raise-panel">
    <div id="rp-presets">
      <button onclick="setR('min')">МИН</button>
      <button onclick="setR(0.25)">¼</button>
      <button onclick="setR(0.5)">½</button>
      <button onclick="setR(0.75)">¾</button>
      <button onclick="setR(1)">POT</button>
      <button onclick="setR('allin')">ALL IN</button>
    </div>
    <div id="rp-row">
      <button id="rp-minus" onclick="nudgeR(-1)">−</button>
      <input type="range" id="raise-slider" min="0" max="1000" oninput="sliderR()">
      <button id="rp-plus"  onclick="nudgeR(1)">+</button>
      <div id="rp-amount">0</div>
      <button id="rp-confirm" onclick="doRaise()">РЕЙЗ</button>
      <button id="rp-close"  onclick="toggleRaisePanel()">✕</button>
    </div>
  </div>

</div>

<!-- WAITING -->
<div id="waiting-overlay">
  <div class="obox">
    <h2>Ожидание игроков</h2>
    <div class="room-code" id="ov-room-code">—</div>
    <p class="hint">Поделитесь кодом с друзьями</p>
    <div id="ov-players"></div>
    <button id="ov-start" onclick="startGame()" style="display:none">▶ Начать игру</button>
    <p id="ov-wait-msg" class="dimtxt">Только хост может начать игру</p>
  </div>
</div>

<!-- WINNER BANNER -->
<div id="winner-banner" style="display:none">
  <div id="winner-inner"><span id="winner-text"></span></div>
</div>

<!-- HISTORY -->
<div id="history-panel" style="display:none">
  <div id="hist-hdr"><span>📋 История раздач</span><button onclick="toggleHistory()">✕</button></div>
  <div id="hist-list"></div>
</div>

<div id="toast"></div>

<script src="/socket.io/socket.io.js"></script>
<script src="sounds.js"></script>
<script src="client.js"></script>
</body>
</html>
